<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>手相鑑定</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ===== TOP BAR ===== -->
  <header class="top-bar" id="topBar">
    <button class="top-action" id="backBtn" style="opacity:0;pointer-events:none">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="top-center">
      <span class="top-icon">✋</span>
      <span class="top-title">手相鑑定</span>
    </div>
    <button class="top-action" id="retakeBtn" style="opacity:0;pointer-events:none" title="撮り直す">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
    </button>
  </header>

  <!-- ===== SCREENS ===== -->
  <main class="screen-container" id="screenContainer">

    <!-- UPLOAD SCREEN -->
    <div class="screen active" id="screenUpload">
      <div class="upload-hero">
        <div class="upload-aura"></div>
        <div class="palm-art">
          <div class="palm-glow"></div>
          <div class="palm-emoji">🖐️</div>
          <div class="orbit orbit1"></div>
          <div class="orbit orbit2"></div>
        </div>
        <h2 class="upload-headline">あなたの運命を<br>読み解きます</h2>
        <p class="upload-sub">手のひらの写真をアップロードしてください</p>
      </div>

      <div class="upload-tips-row">
        <div class="tip-chip">☀️ 明るい場所</div>
        <div class="tip-chip">🤚 手を広げる</div>
        <div class="tip-chip">📏 正面から</div>
      </div>

      <div class="upload-actions">
        <input type="file" id="fileInput" accept="image/*">
        <button class="btn-primary" id="uploadBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          写真を選ぶ
        </button>
        <button class="btn-secondary" id="dropZoneBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          ドラッグ＆ドロップ
        </button>
      </div>

      <!-- Drop overlay -->
      <div class="drop-overlay" id="dropOverlay">
        <div class="drop-inner">
          <div class="drop-icon">🖐️</div>
          <p>ここに写真をドロップ</p>
        </div>
      </div>
    </div>

    <!-- RESULT SCREEN -->
    <div class="screen" id="screenResult">

      <!-- Tab: 手相 (Lines) -->
      <div class="tab-panel active" id="tabLines">
        <div class="panel-scroll">
          <div class="canvas-card">
            <canvas id="palmCanvas"></canvas>
          </div>
          <p class="canvas-hint">線をタップして表示/非表示を切り替え</p>
          <div class="legend-wrap" id="lineLegend"></div>
        </div>
      </div>

      <!-- Tab: 運勢 (Scores) -->
      <div class="tab-panel" id="tabScores">
        <div class="panel-scroll">
          <div class="panel-section-title">総合運勢スコア</div>
          <div class="scores-grid" id="scoresGrid"></div>
          <div class="panel-section-title" style="margin-top:1.5rem">各手相の読み解き</div>
          <div class="readings-list" id="readingsGrid"></div>
        </div>
      </div>

      <!-- Tab: 性格 (Personality) -->
      <div class="tab-panel" id="tabPersonality">
        <div class="panel-scroll">
          <div class="personality-hero">
            <div class="personality-orb">💫</div>
            <h3 class="personality-headline">あなたの本質</h3>
          </div>
          <div class="personality-card" id="personalityText"></div>
        </div>
      </div>

      <!-- Tab: 未来 (Future) -->
      <div class="tab-panel" id="tabFuture">
        <div class="panel-scroll">
          <div class="panel-section-title">これから起こりそうなこと</div>
          <div class="future-list" id="futureTimeline"></div>
        </div>
      </div>

      <!-- Tab: 詳細 (Detail) -->
      <div class="tab-panel" id="tabDetail">
        <div class="panel-scroll">
          <div class="panel-section-title">詳しく鑑定する</div>
          <p class="detail-hint">気になる線を1つ選んでください</p>
          <div class="detail-grid" id="detailOptions"></div>
          <div id="deepReading"></div>
        </div>
      </div>

    </div>
    <!-- /screenResult -->

  </main>

  <!-- ===== BOTTOM TAB BAR ===== -->
  <nav class="tab-bar" id="tabBar" style="display:none">
    <button class="tab-item active" data-tab="Lines">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v8M8 12h8"/></svg>
      <span>手相</span>
    </button>
    <button class="tab-item" data-tab="Scores">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>運勢</span>
    </button>
    <button class="tab-item" data-tab="Personality">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>性格</span>
    </button>
    <button class="tab-item" data-tab="Future">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>未来</span>
    </button>
    <button class="tab-item" data-tab="Detail">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>詳細</span>
    </button>
  </nav>

</div>
<!-- /app -->

<!-- ===== LOADING ===== -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-bg"></div>
  <div class="loading-content">
    <div class="loading-ring">
      <div class="ring-arc arc1"></div>
      <div class="ring-arc arc2"></div>
      <div class="ring-arc arc3"></div>
      <div class="ring-emoji">🔮</div>
    </div>
    <p class="loading-title">鑑定中...</p>
    <div class="loading-progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <p class="loading-step-text" id="loadingStep">手のひらを解析しています</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
